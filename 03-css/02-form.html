<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Roth IRA Calculator</title>
    <link rel="stylesheet" href="styles-form.css" />
  </head>
  <body>
    <main class="calculator-card">
      <h2>Roth IRA Calculator</h2>

      <form action="" method="GET">
        <div class="form-row">
          <label for="balance">Balance ($)</label>
          <input type="text" id="balance" name="balance" />
        </div>

        <div class="form-row">
          <label for="annual-contribution">Annual contribution ($)</label>
          <input
            type="text"
            id="annual-contribution"
            name="annual-contribution"
          />
        </div>

        <fieldset class="radio-section">
          <legend>Maximize contribution?</legend>
          <div class="radio-group">
            <input type="radio" id="yes" name="maximize" value="yes" />
            <label for="yes">Yes</label>

            <input type="radio" id="no" name="maximize" value="no" />
            <label for="no">No</label>
          </div>
        </fieldset>

        <div class="form-row">
          <label for="expected-return">Expected rate of return (%)</label>
          <input type="number" id="expected-return" name="expected-return" />
        </div>

        <div class="form-row">
          <label for="current-age">Current age</label>
          <input type="number" id="current-age" name="current-age" />
        </div>

        <div class="form-row">
          <label for="retirement-age">Retirement age</label>
          <input type="number" id="retirement-age" name="retirement-age" />
        </div>

        <div class="form-row">
          <label for="marginal-tax-rate">Marginal tax rate (%)</label>
          <input
            type="number"
            id="marginal-tax-rate"
            name="marginal-tax-rate"
          />
        </div>

        <div class="button-row">
          <button type="submit" class="btn-calculate">Calculate</button>
          <button type="reset" class="btn-reset">Reset</button>
        </div>
      </form>

      <p class="disclaimer">
        This exercise is a simplified version of the Roth IRA Calculator at
        <a href="https://www.calculator.net">Calculator.net</a>
      </p>
    </main>
  </body>
</html>
